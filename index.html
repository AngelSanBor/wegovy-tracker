<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wegovy"/>
<meta name="theme-color" content="#0a0e1a"/>
<title>Wegovy Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0e1a;font-family:Georgia,'Times New Roman',serif;color:#e8f4f8;-webkit-tap-highlight-color:transparent}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}

#hdr{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(100,200,255,.1);padding:18px 20px 14px;text-align:center;padding-top:calc(18px + env(safe-area-inset-top))}
#hdr h1{font-size:22px;font-weight:bold;letter-spacing:2px;color:#7dd3fc;text-transform:uppercase}
#hdr p{font-size:11px;color:#64748b;margin-top:4px;letter-spacing:3px;text-transform:uppercase}

#tabs{display:flex;border-bottom:1px solid rgba(100,200,255,.1);background:rgba(0,0,0,.2)}
.tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:#4a6680;cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:Georgia,serif;line-height:1.5}
.tab-btn.active{background:rgba(125,211,252,.1);border-bottom:2px solid #7dd3fc;color:#7dd3fc}

#content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(100,200,255,.1);border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7dd3fc;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(100,200,255,.08);border-radius:10px;padding:14px 12px;text-align:center}
.stat-val{font-size:28px;font-weight:bold;color:#7dd3fc;line-height:1}
.stat-lbl{font-size:10px;color:#4a6680;letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}

label{font-size:11px;color:#64748b;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
input,select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(100,200,255,.15);border-radius:8px;padding:10px 12px;color:#e8f4f8;font-size:16px;font-family:Georgia,serif;outline:none;box-sizing:border-box;margin-bottom:10px}
select{background:#0f1829}
.btn-primary{background:linear-gradient(135deg,#1e4a7a,#0f3460);border:1px solid rgba(125,211,252,.3);border-radius:8px;color:#7dd3fc;padding:11px 20px;cursor:pointer;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;width:100%;font-family:Georgia,serif;margin-top:4px}
.btn-del{background:transparent;border:1px solid rgba(248,113,113,.3);border-radius:6px;color:#f87171;padding:4px 10px;cursor:pointer;font-size:11px;font-family:Georgia,serif}
.btn-sev{flex:1;padding:9px;border-radius:8px;cursor:pointer;font-size:12px;font-family:Georgia,serif;border:1px solid rgba(100,200,255,.1);background:rgba(255,255,255,.03);color:#4a6680}
.btn-sev.active-1{background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399}
.btn-sev.active-2{background:rgba(251,191,36,.12);border-color:#fbbf24;color:#fbbf24}
.btn-sev.active-3{background:rgba(248,113,113,.12);border-color:#f87171;color:#f87171}

.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:6px;border:1px solid rgba(100,200,255,.06)}
.row-item-col{flex-direction:column;align-items:flex-start}
.tag{border-radius:20px;padding:2px 10px;font-size:12px}
.pill{display:inline-block;border-radius:12px;padding:3px 10px;font-size:11px;margin-right:5px;margin-bottom:4px}
.empty{text-align:center;color:#334155;padding:20px;font-size:13px}

.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.check-item{background:rgba(255,255,255,.03);border:1px solid rgba(100,200,255,.1);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:11px;color:#4a6680;display:flex;align-items:center;gap:6px;user-select:none}
.check-item.checked{background:rgba(125,211,252,.12);border-color:rgba(125,211,252,.4);color:#7dd3fc}

#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#14532d;border:1px solid #22c55e;border-radius:8px;padding:10px 20px;color:#86efac;font-size:13px;z-index:1000;white-space:nowrap}

.dose-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:4px}
.dose-dot{width:8px;height:8px;border-radius:50%}

.next-pill{border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.imc-card{border-radius:12px;padding:14px 16px;margin-bottom:14px}
.imc-bar{position:relative;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:12px}
.imc-seg{position:absolute;height:100%;opacity:.5}
.imc-dot{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;border:2px solid #0f1829;transform:translateX(-50%)}

.sev-row{display:flex;gap:8px;margin-bottom:10px}
</style>
</head>
<body>
<div id="hdr">
  <h1>&#11041; Wegovy Tracker</h1>
  <p>Control de tratamiento &middot; Semaglutida</p>
</div>
<div id="tabs">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">&#128202;<br>Resumen</button>
  <button class="tab-btn" data-tab="tomas" onclick="switchTab('tomas')">&#128137;<br>Tomas</button>
  <button class="tab-btn" data-tab="peso" onclick="switchTab('peso')">&#9878;&#65039;<br>Peso</button>
  <button class="tab-btn" data-tab="sintomas" onclick="switchTab('sintomas')">&#129322;<br>Sintomas</button>
</div>
<div id="content"></div>
<div id="toast"></div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── Data ──
const KEY = 'wegovy:v4';
const DOSIS = ['0.25 mg','0.5 mg','1.0 mg','1.7 mg','2.4 mg'];
const DCOL  = {'0.25 mg':'#60a5fa','0.5 mg':'#34d399','1.0 mg':'#fbbf24','1.7 mg':'#f97316','2.4 mg':'#a78bfa'};
const EFX   = ['Nauseas','Vomitos','Diarrea','Estrenimiento','Dolor abdominal','Fatiga','Mareos','Cefalea','Reflujo','Sin apetito','Otros'];
const SL    = {1:'Leve',2:'Moderado',3:'Severo'};
const SC    = {1:'#34d399',2:'#fbbf24',3:'#f87171'};

let state = (()=>{ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){return null;} })()
  || { injections:[], weights:[], sideEffects:[], startDate:null, startWeight:109, height:185 };

let activeTab = 'dashboard';
let forms = { dose:'0.25 mg', injDate:today(), injNotes:'', wDate:today(), wKg:'', seDate:today(), seEfx:[], seSev:1, seNotes:'' };

function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d)return''; const[y,m,day]=d.split('-'); return day+'/'+m+'/'+y; }
function addD(ds,n){ const d=new Date(ds); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function diff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function imc(w,h){ return(!w||!h)?null:+(w/Math.pow(h/100,2)).toFixed(1); }
function ideal(h){ return +(h-100-(h-150)/4).toFixed(1); }
function imcCat(v){
  if(v<18.5) return{l:'Bajo peso',c:'#60a5fa'};
  if(v<25)   return{l:'Normopeso',c:'#34d399'};
  if(v<30)   return{l:'Sobrepeso',c:'#fbbf24'};
  if(v<35)   return{l:'Obesidad I',c:'#f97316'};
  if(v<40)   return{l:'Obesidad II',c:'#f87171'};
  return           {l:'Ob. morbida',c:'#dc2626'};
}

function save(){
  try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){}
  showToast('Guardado');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent='✓ '+msg; t.style.display='block';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.style.display='none',2000);
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  render();
}

// ── SVG Chart ──
function svgChart(data, startW){
  if(!data||data.length<2) return '';
  const W=300,H=148,PL=36,PR=8,PT=8,PB=24;
  const iW=W-PL-PR, iH=H-PT-PB;
  const vals=data.map(d=>d.p);
  const minV=Math.floor(Math.min(...vals))-1;
  const maxV=Math.ceil(Math.max(...vals))+1;
  const xS=i=>(PL+(i/(data.length-1))*iW).toFixed(1);
  const yS=v=>(PT+(1-(v-minV)/(maxV-minV))*iH).toFixed(1);
  const pts=data.map((d,i)=>xS(i)+','+yS(d.p)).join(' ');
  const ticks=[minV,Math.round((minV+maxV)/2),maxV];
  const xl=data.length<=5?data.map((_,i)=>i):[0,Math.floor((data.length-1)/2),data.length-1];
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">`;
  ticks.forEach(t=>{ s+=`<line x1="${PL}" y1="${yS(t)}" x2="${W-PR}" y2="${yS(t)}" stroke="rgba(100,200,255,.08)" stroke-dasharray="3 3"/>`; });
  if(startW&&startW>=minV&&startW<=maxV)
    s+=`<line x1="${PL}" y1="${yS(startW)}" x2="${W-PR}" y2="${yS(startW)}" stroke="#f87171" stroke-dasharray="5 3" stroke-opacity=".4"/>`;
  s+=`<polyline points="${pts}" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  data.forEach((d,i)=>{ s+=`<circle cx="${xS(i)}" cy="${yS(d.p)}" r="4" fill="#7dd3fc"/>`; });
  ticks.forEach(t=>{ s+=`<text x="${PL-4}" y="${(+yS(t)+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#4a6680">${t}</text>`; });
  xl.forEach(i=>{ s+=`<text x="${xS(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#4a6680">${data[i].f}</text>`; });
  s+='</svg>'; return s;
}

// ── Stats ──
function getStats(){
  const sw=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const lastW=sw.length?sw[sw.length-1].weight:null;
  const wLoss=lastW!==null&&state.startWeight!==null?+(lastW-state.startWeight).toFixed(1):null;
  const si=[...state.injections].sort((a,b)=>a.date.localeCompare(b.date));
  const lastI=si.length?si[si.length-1]:null;
  const nextD=lastI?addD(lastI.date,7):null;
  const dNext=nextD?diff(today(),nextD):null;
  const wks=state.startDate?Math.max(0,Math.floor(diff(state.startDate,today())/7)):0;
  const imcVal=imc(lastW,state.height);
  const imcStart=imc(state.startWeight,state.height);
  const imcInfo=imcVal?imcCat(imcVal):null;
  const chartData=sw.map(w=>({f:w.date.slice(5).replace('-','/'),p:w.weight}));
  return {sw,lastW,wLoss,lastI,nextD,dNext,wks,imcVal,imcStart,imcInfo,chartData};
}

// ── Render Dashboard ──
function renderDashboard(){
  const {lastW,wLoss,lastI,nextD,dNext,wks,imcVal,imcStart,imcInfo,chartData} = getStats();
  let h='';

  // Next dose
  if(nextD){
    const bc=dNext<=1?'rgba(248,113,113,.1)':dNext<=3?'rgba(251,191,36,.1)':'rgba(52,211,153,.08)';
    const br=dNext<=1?'rgba(248,113,113,.4)':dNext<=3?'rgba(251,191,36,.3)':'rgba(52,211,153,.2)';
    const dc=dNext<=1?'#f87171':dNext<=3?'#fbbf24':'#34d399';
    const dv=dNext===0?'HOY':dNext<0?'VENCIDA':dNext+'d';
    h+=`<div class="next-pill" style="background:${bc};border:1px solid ${br}">
      <div>
        <div style="font-size:11px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Proxima dosis</div>
        <div style="font-size:15px;color:#e8f4f8">${fmt(nextD)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:26px;font-weight:bold;line-height:1;color:${dc}">${dv}</div>
        ${dNext!==0?'<div style="font-size:10px;color:#4a6680">para inyeccion</div>':''}
      </div>
    </div>`;
  } else {
    h+=`<div class="card" style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:8px">&#128137;</div>
      <div style="font-size:13px;color:#4a6680">Registra tu primera toma para comenzar</div>
    </div>`;
  }

  // Stats
  const wc=wLoss!==null&&wLoss<0?'#34d399':'#f87171';
  const wv=wLoss!==null?(wLoss>0?'+':'')+wLoss+' kg':'—';
  h+=`<div class="grid2">
    <div class="stat-card"><div class="stat-val">${wks}</div><div class="stat-lbl">Semanas</div></div>
    <div class="stat-card"><div class="stat-val">${state.injections.length}</div><div class="stat-lbl">Tomas</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:22px;color:${wc}">${wv}</div><div class="stat-lbl">Variacion</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:17px">${lastI?lastI.dose:'—'}</div><div class="stat-lbl">Ultima dosis</div></div>
  </div>`;

  // IMC
  if(imcVal&&imcInfo){
    const kgObj=lastW&&state.height?+(lastW-ideal(state.height)).toFixed(1):null;
    const pct=Math.min(Math.max((imcVal-10)/45*100,1),99);
    const segs=[['#60a5fa',0,18.5],['#34d399',18.5,25],['#fbbf24',25,30],['#f97316',30,35],['#f87171',35,40],['#dc2626',40,55]];
    let segHtml=segs.map(([c,f,t])=>`<div class="imc-seg" style="left:${((f-10)/45*100).toFixed(1)}%;width:${((t-f)/45*100).toFixed(1)}%;background:${c}"></div>`).join('');
    h+=`<div class="imc-card" style="background:${imcInfo.c}18;border:1px solid ${imcInfo.c}35">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#64748b;margin-bottom:10px">Indice de masa corporal</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:38px;font-weight:bold;color:${imcInfo.c};line-height:1">${imcVal}</div>
          <div style="font-size:13px;color:${imcInfo.c};margin-top:4px">${imcInfo.l}</div>
          ${imcStart?`<div style="font-size:11px;color:#4a6680;margin-top:3px">inicio ${imcStart} &middot; &Delta; ${+(imcVal-imcStart).toFixed(1)}</div>`:''}
        </div>
        <div style="text-align:right;font-size:12px;color:#4a6680">
          <div>Talla: ${state.height} cm</div>
          <div style="margin:3px 0">Peso: ${lastW} kg</div>
          ${kgObj!==null?`<div style="color:${kgObj<=5?'#34d399':'#fbbf24'}">Objetivo: -${kgObj} kg</div>`:''}
        </div>
      </div>
      <div class="imc-bar">${segHtml}<div class="imc-dot" style="left:${pct}%;background:${imcInfo.c}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        ${['18.5','25','30','35','40'].map(v=>`<span style="font-size:9px;color:#334155">${v}</span>`).join('')}
      </div>
    </div>`;
  }

  // Chart
  if(chartData.length>=2){
    h+=`<div class="card"><div class="card-title">Evolucion del peso</div>${svgChart(chartData,state.startWeight)}</div>`;
  }

  // Dose ladder
  const lastDoseIdx=lastI?DOSIS.indexOf(lastI.dose):-1;
  let ladder='';
  DOSIS.forEach((d,i)=>{
    const active=i===lastDoseIdx, past=i<lastDoseIdx;
    const n=state.injections.filter(x=>x.dose===d).length;
    const col=DCOL[d];
    ladder+=`<div class="dose-row" style="background:${active?col+'18':'transparent'};border:1px solid ${active?col+'50':'transparent'}">
      <div class="dose-dot" style="background:${past||active?col:'#1e293b'};border:2px solid ${col}"></div>
      <div style="flex:1;font-size:13px;color:${active?'#e8f4f8':past?'#7dd3fc':'#334155'}">${d}</div>
      <div style="font-size:11px;color:#4a6680">${n?n+' toma'+(n>1?'s':''):''}${active?` <span style="color:${col}">actual</span>`:''}</div>
    </div>`;
  });
  h+=`<div class="card"><div class="card-title">Protocolo de escalada</div>${ladder}</div>`;
  return h;
}

// ── Render Tomas ──
function renderTomas(){
  let rows=state.injections.length?[...state.injections].reverse().map(inj=>`
    <div class="row-item">
      <div>
        <div style="font-size:13px;color:#e8f4f8;margin-bottom:2px">${fmt(inj.date)}</div>
        ${inj.notes?`<div style="font-size:11px;color:#4a6680">${inj.notes}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="tag" style="background:${DCOL[inj.dose]}22;border:1px solid ${DCOL[inj.dose]}55;color:${DCOL[inj.dose]}">${inj.dose}</span>
        <button class="btn-del" onclick="delItem('injections',${inj.id})">&#x2715;</button>
      </div>
    </div>`).join(''):'<div class="empty">Sin registros aun</div>';

  return `<div class="card">
    <div class="card-title">Registrar toma</div>
    <label>Fecha</label>
    <input type="date" id="iDate" value="${forms.injDate}"/>
    <label>Dosis</label>
    <select id="iDose">${DOSIS.map(d=>`<option value="${d}"${d===forms.dose?' selected':''}>${d}</option>`).join('')}</select>
    <label>Notas (opcional)</label>
    <input type="text" id="iNotes" value="${forms.injNotes}" placeholder="Zona, observaciones..."/>
    <button class="btn-primary" onclick="addInj()">+ Registrar toma</button>
  </div>
  <div class="card">
    <div class="card-title">Historial (${state.injections.length})</div>
    ${rows}
  </div>`;
}

// ── Render Peso ──
function renderPeso(){
  const {sw,lastW,wLoss,chartData}=getStats();
  let rows=sw.length?[...sw].reverse().map((w,i,arr)=>{
    const prev=arr[i+1];
    const d=prev?+(w.weight-prev.weight).toFixed(1):null;
    const wi=imc(w.weight,state.height);
    const wcat=wi?imcCat(wi):null;
    return `<div class="row-item">
      <div>
        <div style="font-size:13px;color:#e8f4f8;margin-bottom:2px">${fmt(w.date)}</div>
        ${d!==null?`<div style="font-size:11px;color:${d<0?'#34d399':'#f87171'}">${d>0?'+':''}${d} kg</div>`:''}
        ${wcat?`<div style="font-size:11px;color:${wcat.c}">IMC ${wi} &middot; ${wcat.l}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px;color:#7dd3fc;font-weight:bold">${w.weight} kg</span>
        <button class="btn-del" onclick="delItem('weights',${w.id})">&#x2715;</button>
      </div>
    </div>`;
  }).join(''):'<div class="empty">Sin registros aun</div>';

  let chartHtml='';
  if(chartData.length>=2){
    const wc=wLoss!==null&&wLoss<0?'#34d399':'#f87171';
    const pct=wLoss!==null&&state.startWeight?((wLoss/state.startWeight)*100).toFixed(1):0;
    chartHtml=`<div class="card">
      <div class="card-title">Curva de peso</div>
      ${wLoss!==null?`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:#4a6680">
        <span>Inicio: <span style="color:#e8f4f8">${state.startWeight} kg</span></span>
        <span>Actual: <span style="color:#e8f4f8">${lastW} kg</span></span>
        <span style="color:${wc};font-weight:bold">${wLoss>0?'+':''}${wLoss} kg (${pct}%)</span>
      </div>`:''}
      ${svgChart(chartData,state.startWeight)}
    </div>`;
  }

  return `<div class="card">
    <div class="card-title">Registrar peso</div>
    <label>Fecha</label>
    <input type="date" id="wDate" value="${forms.wDate}"/>
    <label>Talla (cm)</label>
    <input type="number" id="wHeight" value="${state.height||''}" placeholder="185" step="1" min="100" max="250" onchange="updateHeight(this.value)"/>
    <label>Peso (kg)</label>
    <input type="number" id="wKg" value="${forms.wKg}" placeholder="ej: 92.5" step="0.1" min="30" max="300"/>
    <button class="btn-primary" onclick="addWeight()">+ Registrar peso</button>
  </div>
  ${chartHtml}
  <div class="card">
    <div class="card-title">Historial (${state.weights.length})</div>
    ${rows}
  </div>`;
}

// ── Render Sintomas ──
function renderSintomas(){
  const checks=EFX.map(ef=>`<div class="check-item${forms.seEfx.includes(ef)?' checked':''}" onclick="togEfx('${ef}')">${forms.seEfx.includes(ef)?'&#10003;':'&#9675;'} ${ef}</div>`).join('');
  const sevBtns=[1,2,3].map(s=>`<button class="btn-sev${forms.seSev===s?' active-'+s:''}" onclick="setSev(${s})">${SL[s]}</button>`).join('');

  let rows=state.sideEffects.length?[...state.sideEffects].reverse().map(se=>`
    <div class="row-item row-item-col">
      <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:6px">
        <div style="font-size:13px;color:#e8f4f8">${fmt(se.date)}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="tag" style="background:${SC[se.severity]}22;border:1px solid ${SC[se.severity]}55;color:${SC[se.severity]}">${SL[se.severity]}</span>
          <button class="btn-del" onclick="delItem('sideEffects',${se.id})">&#x2715;</button>
        </div>
      </div>
      <div>${se.effects.map(ef=>`<span class="pill" style="background:#94a3b822;border:1px solid #94a3b844;color:#94a3b8">${ef}</span>`).join('')}</div>
      ${se.notes?`<div style="font-size:11px;color:#4a6680;margin-top:4px">${se.notes}</div>`:''}
    </div>`).join(''):'<div class="empty">Sin registros aun</div>';

  return `<div class="card">
    <div class="card-title">Registrar sintomas</div>
    <label>Fecha</label>
    <input type="date" id="sDate" value="${forms.seDate}"/>
    <label>Sintomas</label>
    <div class="check-grid">${checks}</div>
    <label>Intensidad</label>
    <div class="sev-row">${sevBtns}</div>
    <label>Notas (opcional)</label>
    <input type="text" id="sNotes" value="${forms.seNotes}" placeholder="Observaciones..."/>
    <button class="btn-primary" style="opacity:${forms.seEfx.length?1:.4}" onclick="addSE()">+ Registrar sintomas</button>
  </div>
  <div class="card">
    <div class="card-title">Historial (${state.sideEffects.length})</div>
    ${rows}
  </div>`;
}

// ── Actions ──
function addInj(){
  const date=document.getElementById('iDate')?.value;
  const dose=document.getElementById('iDose')?.value;
  const notes=document.getElementById('iNotes')?.value||'';
  if(!date||!dose) return;
  state.injections.push({id:Date.now(),date,dose,notes});
  state.injections.sort((a,b)=>a.date.localeCompare(b.date));
  if(!state.startDate) state.startDate=date;
  forms.injNotes=''; forms.dose=dose; forms.injDate=today();
  save(); render();
}

function addWeight(){
  const date=document.getElementById('wDate')?.value;
  const kg=parseFloat(document.getElementById('wKg')?.value);
  if(!date||isNaN(kg)||kg<30||kg>300) return;
  state.weights=state.weights.filter(x=>x.date!==date);
  state.weights.push({id:Date.now(),date,weight:kg});
  state.weights.sort((a,b)=>a.date.localeCompare(b.date));
  if(state.startWeight===null) state.startWeight=kg;
  forms.wKg=''; forms.wDate=today();
  save(); render();
}

function updateHeight(v){
  const h=parseFloat(v);
  if(h>=100&&h<=250){ state.height=h; save(); }
}

function addSE(){
  const date=document.getElementById('sDate')?.value;
  const notes=document.getElementById('sNotes')?.value||'';
  if(!date||!forms.seEfx.length) return;
  state.sideEffects.push({id:Date.now(),date,effects:[...forms.seEfx],severity:forms.seSev,notes});
  state.sideEffects.sort((a,b)=>a.date.localeCompare(b.date));
  forms.seEfx=[]; forms.seSev=1; forms.seNotes=''; forms.seDate=today();
  save(); render();
}

function delItem(type,id){
  state[type]=state[type].filter(x=>x.id!==id);
  save(); render();
}

function togEfx(ef){
  if(forms.seEfx.includes(ef)) forms.seEfx=forms.seEfx.filter(e=>e!==ef);
  else forms.seEfx.push(ef);
  render();
}

function setSev(s){ forms.seSev=s; render(); }

// ── Main render ──
function render(){
  const el=document.getElementById('content');
  switch(activeTab){
    case 'dashboard': el.innerHTML=renderDashboard(); break;
    case 'tomas':     el.innerHTML=renderTomas();     break;
    case 'peso':      el.innerHTML=renderPeso();      break;
    case 'sintomas':  el.innerHTML=renderSintomas();  break;
  }
}

render();
</script>
</body>
</html>
